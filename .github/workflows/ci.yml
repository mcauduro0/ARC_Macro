name: CI

# CI gate. Fixes audit finding ci-1 ("CI never runs the test suite").
# Both the Python foundation suite and the TS/vitest suite (385 tests) must pass.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python-foundation:
    name: Python foundation (gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install foundation deps
        run: pip install "numpy>=1.24" "pandas>=2.0" "scipy>=1.10" "pydantic>=2.0" "pytest>=8" "duckdb>=1.0"
      - name: Run Phase 0 suite (reproducibility + contracts + leakage canaries)
        run: pytest tests/ -v

  ts-tests:
    name: TS / vitest (gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # No version here: pnpm/action-setup reads it from package.json "packageManager"
      # (pnpm@10.4.1). Specifying both errors with "Multiple versions of pnpm specified".
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - name: Install JS deps
        run: pnpm install --frozen-lockfile
      - name: Run vitest
        run: pnpm test
